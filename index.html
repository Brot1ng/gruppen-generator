<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zufälliger Gruppen-Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top-Bar: Titel und kompaktes Profil an der Seite -->
    <header class="top-bar">
        <h1>🎲 Gruppen-Generator</h1>
        
        <div class="profile-compact">
            <select id="profile-select"></select>
            <input type="text" id="new-profile-name" placeholder="Neue Klasse/Profil">
            <button id="create-profile-btn">+</button>
        </div>
    </header>

    <main class="main-content">
        <!-- Schülerliste verwalten -->
        <div class="control-panel">
            <!-- НОВЕ: Поле для вставки всього списку відразу -->
            <div class="import-section">
                <textarea id="mass-input" rows="4" placeholder="Fügen Sie hier die Namensliste ein (jeder Name in einer neuen Zeile oder mit Komma getrennt)"></textarea>
                <button id="import-btn">Liste importieren 📋</button>
            </div>

            <div class="or-separator"><span>ODER</span></div>

            <!-- Поштучне введення (залишається про всяк випадок) -->
            <div class="input-group">
                <input type="text" id="name-input" placeholder="Einzelnen Namen eingeben und Enter drücken">
                <button id="add-name-btn">Hinzufügen</button>
            </div>
            
            <p class="hint">💡 **Tipp:** Klicken Sie auf einen Namen, um die Person als **abwesend** zu markieren (sie wird grau und wird nicht eingeteilt).</p>
            
            <div id="names-list" class="names-grid">
                <!-- Hier erscheinen die 15+ Schüler-Kästchen -->
            </div>
        </div>

        <!-- Startbereich und Gruppengröße -->
        <div class="action-zone">
            <div class="size-picker">
                <label for="group-size">Personen pro Gruppe:</label>
                <input type="number" id="group-size" value="3" min="1" max="50">
            </div>
            <button id="generate-btn" class="start-btn">Gruppen bilden! ✨</button>
        </div>
    </main>

    <!-- Vollbild-Overlay für Animation und Ergebnisse -->
    <div id="fullscreen-overlay" class="overlay hidden">
        <div id="loader-screen" class="loader-container">
            <div class="spinner"></div>
            <h2>Mische Teilnehmer... 🎲</h2>
        </div>

        <div id="result-screen" class="result-container hidden">
            <button id="close-overlay-btn" class="close-btn">&times; Schließen</button>
            <h2 class="result-title">Gebildete Gruppen:</h2>
            <div id="results-grid" class="results-max-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
